name: Send Event Reminders

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder endpoint
        run: |
          if [ -z "$APP_URL" ]; then
            echo "ERROR: APP_URL secret is not set or is empty."
            exit 1
          fi

          FULL_URL="${APP_URL}/api/events/send-reminders?secret=${CRON_SECRET}"
          echo "Calling: $FULL_URL"

          RESPONSE=$(curl -s -o /tmp/reminder_response.txt -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -X GET "${{ secrets.APP_URL }}/api/events/send-reminders?secret=${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions-Cron")

          cat /tmp/reminder_response.txt

          if ! [[ "$RESPONSE" =~ ^[0-9]+$ ]] || [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "Reminder endpoint returned HTTP $RESPONSE"
            exit 1
          fi

          echo "Reminder endpoint succeeded with HTTP $RESPONSE"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}