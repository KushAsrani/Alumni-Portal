version: '3.8'

services:
  # PostgreSQL for n8n internal storage
  postgres:
    image: postgres:15-alpine
    container_name: alumni-portal-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password_change_this
      - POSTGRES_DB=n8n
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alumni-portal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n Workflow Automation
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    image: n8nio/n8n:latest
    container_name: alumni-portal-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Basic Auth
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme123
      
      # Host Configuration
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      
      # Timezone
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
      
      # PostgreSQL Database (for n8n internal storage)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password_change_this
      
      # Execution Mode
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      
      # Security
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-n8n-encryption-key-change-this-to-random-string}
      
      # Logging
      - N8N_LOG_LEVEL=info
      - N8N_LOG_OUTPUT=console
      
      - NODES_EXCLUDE=[]
      
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
      - ./n8n/backup:/backup
      - ./openalumns/Alumni-Portal:/home/node/.n8n/Alumni-Portal
    networks:
      - alumni-portal-network
      # Add host networking to access localhost services
    extra_hosts:
      - "host.docker.internal:host-gateway" # For accessing the Astro frontend on port 4321
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Python Flask API for Job Scraping
  scraper-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: alumni-portal-scraper
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_PORT=5000
      - FLASK_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - PORTAL_URL=http://host.docker.internal:4321
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    networks:
      - alumni-portal-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Flask API for AI Resume Analysis
  resume-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: alumni-portal-resume-api
    restart: unless-stopped
    command: ["python", "resume_api.py"]
    ports:
      - "5001:5001"
    environment:
      - FLASK_PORT=5001
      - FLASK_ENV=production
      - RESUME_API_PORT=5001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}
    volumes:
      - ./actuarial_jobs_india.json:/app/actuarial_jobs_india.json
    networks:
      - alumni-portal-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: alumni-portal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alumni-portal-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB Express - Web UI for MongoDB Atlas
  mongo-express:
    image: mongo-express:latest
    container_name: alumni-portal-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=${MONGODB_URI}
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
    networks:
      - alumni-portal-network

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  alumni-portal-network:
    driver: bridge